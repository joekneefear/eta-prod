# Nginx Location Block for STDF Translator
# Add this to your existing server block in nginx.conf

    location /stdf-convert-benchmark/ {
        # Proxy to the local Rust service running on port 3000
        proxy_pass http://127.0.0.1:3000/;

        # Essential for large file uploads - disable body size limit
        client_max_body_size 0; 
        
        # Essential for streaming - disable buffering
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Standard Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for large files
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
