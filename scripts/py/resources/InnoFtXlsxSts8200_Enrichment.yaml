# INNO Final Test XLSX Enrichment Configuration
#
# Site-keyed mapping rules for InnoFtXlsxEnricher.
# Supported rule types: constant, field, refdb
# Supported transforms: regex_replace, format, slice, normalize_date, fallback

# INNOBE site-specific block — used when --site INNOBE is passed via CLI
INNOBE:
  match_fab: ["INNOBE"]
  env: "inno_ft_xlsx"
  fields:
    AlternateProduct:
      type: field
      source: Product
      target: ALTERNATE_PRODUCT

    EndTime:
      type: field
      source: TestDate
      normalize_date: true
      target: END_TIME

    Fab:
      type: refdb
      source: fab
      target: FAB
      fallback:
        type: constant
        value: "INNOBE:INNOSCIENCE BEBUYCVN"
        target: FAB

    Handler:
      type: field
      source: Handler
      target: HANDLER

    LotId:
      type: field
      source: LotID
      target: LOT

    MeasuringEquipment:
      type: field
      source: TesterId
      target: MEASURING_EQUIPMENT

    ProcessingStep:
      type: constant
      value: "FT"
      target: PROCESSING_STEP

    TestFacility:
      type: constant
      value: "INNOBE:INNOSCIENCE BEBUYCVN"
      target: TEST_FACILITY

    Product:
      type: field
      source: Device Name
      target: PRODUCT

    Program:
      type: field
      source: Program
      target: PROGRAM

    Recipe:
      type: field
      source: Program
      target: RECIPE

    RecipeRevision:
      type: field
      source: Program
      regex_replace: ['^.*_[A-Z]+[-]?(\d+)(?=_|\.|$).*$', '\1']
      target: RECIPE_REVISION

    TesterSoftware:
      type: field
      source: Program
      target: TESTER_SOFTWARE

    TesterSoftwareVersion:
      type: field
      source: Program
      regex_replace: ['^.*_[A-Z]+[-]?(\d+)(?=_|\.|$).*$', '\1']
      target: TESTER_SOFTWARE_VERSION

    SourceLot:
      type: refdb
      source: sourceLot
      format: "{0}.S"
      target: SOURCE_LOT
      fallback:
        type: field
        source: LotID
        regex_replace: ['(\.[^.]*)?$', '.S']
        target: SOURCE_LOT

    StartTime:
      type: field
      source: TestDate
      normalize_date: true
      target: START_TIME

    Temperature:
      type: field
      source: Test temp
      target: TEMPERATURE

    WaferId:
      type: field
      source: WaferModle
      target: SCRIBE_ID

    SubconLotId:
      type: field
      source: Sub LotID
      target: SUBCON_LOT

    Operator:
      type: field
      source: Operator ID
      target: OPERATOR


# DEFAULT block — pass-through baseline (no match_fab, used as fallback for any site)
