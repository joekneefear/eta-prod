  WmcPositiveX: "R"
  WmcPositiveY: "D"

WS_Refdb_Client:
  retries: 5
  backoff_factor: 0.5
  status_forcelist:
    - 500
    - 502
    - 504
  timeout: 5.0

xml_sanitizer:
  enable_encoding_cleanup: true
  drop_replacement_character: true
  escape_unescaped_ampersand: true
  escape_angle_brackets_in_attributes: true
  normalize_attribute_whitespace: true
  remove_null_bytes: true
  final_utf8_validation: true
  remove_codepoints: [27]
  remove_codepoint_ranges:
    - [127, 159]
  replacements:
    "\u00A0": " "
    "\u202F": " "
    "\u2007": " "
    "\u2009": " "
    "\u200A": " "
    "\u200B": ""
    "\u200C": ""
    "\u200D": ""
    "\u2060": ""
    "\uFEFF": ""
    "\u2018": "'"
    "\u2019": "'"
    "\u201C": "\""
    "\u201D": "\""
    "\u2013": "-"
    "\u2014": "-"

